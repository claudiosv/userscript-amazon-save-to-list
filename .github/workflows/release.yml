name: Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: latest

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm build

            - name: Publish GitHub release with userscript asset
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create ${{ github.ref_name }} \
                    dist/save-to-list.user.js \
                    --title "${{ github.ref_name }}" \
                    --generate-notes
